services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${TIMESCALE_USER:-reddit}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-reddit}
      - POSTGRES_DB=${TIMESCALE_DB:-reddit}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - POLL_INTERVAL=30
    depends_on:
      kafka:
        condition: service_healthy

  storage:
    build: ./storage
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATABASE_URL=postgresql://${TIMESCALE_USER:-reddit}:${TIMESCALE_PASSWORD:-reddit}@timescaledb:5432/${TIMESCALE_DB:-reddit}
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    environment:
      - DB_URL=postgresql+psycopg2://${TIMESCALE_USER:-reddit}:${TIMESCALE_PASSWORD:-reddit}@timescaledb:5432/${TIMESCALE_DB:-reddit}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  timescale-data:
